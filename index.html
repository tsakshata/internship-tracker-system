<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width" />
    <title>Internship Tracker System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Internship Tracker</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Students</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Internships</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Reports</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Section -->
    <div class="container mt-5">

        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">
                Internship Tracker System
            </h1>

            <p class="lead">
                Manage students, internships, and reports efficiently.
            </p>
        </div>

        <!-- Form Card -->
        <div class="card shadow p-4">

            <h3 class="mb-4 text-center">
                Add Internship Details
            </h3>

            <form>

                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text" class="form-control" placeholder="Enter Student Name">
                </div>

                <div class="mb-3">
                    <label class="form-label">College Name</label>
                    <input type="text" class="form-control" placeholder="Enter College Name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" class="form-control" placeholder="Enter Company Name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Duration</label>
                    <input type="text" class="form-control" placeholder="Enter Internship Duration">
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>

                    <select class="form-select">
                        <option>Ongoing</option>
                        <option>Completed</option>
                        <option>Pending</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Submit
                </button>

            </form>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
