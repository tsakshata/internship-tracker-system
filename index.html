<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internship Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🎓 Internship Tracker</h1>
    <p class="subtitle">Manage and track all your interns in one place</p>
  </header>

  <!-- Stats Bar -->
  <section class="stats-bar">
    <div class="stat-card">
      <span class="stat-number" id="total-count">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-card active">
      <span class="stat-number" id="active-count">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat-card completed">
      <span class="stat-number" id="completed-count">0</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-card pending">
      <span class="stat-number" id="pending-count">0</span>
      <span class="stat-label">Pending</span>
    </div>
  </section>

  <!-- Add Intern Form -->
  <section class="form-section">
    <h2>Add New Intern</h2>
    <div class="form-grid">
      <input type="text" id="intern-name" placeholder="Full Name" />
      <input type="text" id="intern-dept" placeholder="Department" />
      <input type="email" id="intern-email" placeholder="Email" />
      <select id="intern-status">
        <option value="">Select Status</option>
        <option value="Active">Active</option>
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
      </select>
    </div>
    <p class="error-msg" id="error-msg"></p>
    <button id="add-btn" onclick="addIntern()">+ Add Intern</button>
  </section>

  <!-- Search & Filter -->
  <section class="controls">
    <input type="text" id="search-input" placeholder="🔍 Search by name or department..." oninput="renderInterns()" />
    <select id="filter-status" onchange="renderInterns()">
      <option value="All">All Statuses</option>
      <option value="Active">Active</option>
      <option value="Pending">Pending</option>
      <option value="Completed">Completed</option>
    </select>
  </section>

  <!-- Intern List -->
  <section class="list-section">
    <div id="intern-list" class="intern-grid"></div>
    <p id="empty-msg" class="empty-msg">No interns added yet. Start by adding one above!</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
